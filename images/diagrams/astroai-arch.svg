<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 540" role="img" aria-label="AstroAI X system architecture diagram" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
	<defs>
		<marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
			<polygon points="0 0, 10 3.5, 0 7" fill="#4bffa5" opacity="0.75"/>
		</marker>
		<filter id="glow">
			<feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#4bffa5" flood-opacity="0.25"/>
		</filter>
		<filter id="glowSm">
			<feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#4bffa5" flood-opacity="0.18"/>
		</filter>
		<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
			<path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(75,255,165,0.04)" stroke-width="1"/>
		</pattern>
	</defs>

	<!-- Background -->
	<rect width="800" height="540" rx="16" fill="#0d0c14"/>
	<rect width="800" height="540" rx="16" fill="url(#grid)"/>

	<!-- Title -->
	<text x="400" y="30" text-anchor="middle" fill="#ffffff" fill-opacity="0.82" font-size="15" font-weight="600" letter-spacing="0.02em">AstroAI X — System Architecture</text>

	<!-- ===== ROW 0: INPUT LAYER ===== -->

	<!-- Voice Input -->
	<rect x="14" y="46" width="148" height="52" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#4bffa5" stroke-opacity="0.28" stroke-width="1.2"/>
	<text x="88" y="67" text-anchor="middle" fill="#ffffff" fill-opacity="0.88" font-size="12" font-weight="600">Voice Input</text>
	<text x="88" y="85" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="10.5">low-latency mic</text>

	<!-- React Native Client (highlighted) -->
	<rect x="300" y="46" width="200" height="52" rx="9" fill="#4bffa5" fill-opacity="0.07" stroke="#4bffa5" stroke-opacity="0.6" stroke-width="1.5" filter="url(#glowSm)"/>
	<text x="400" y="67" text-anchor="middle" fill="#4bffa5" font-size="13" font-weight="700">React Native Client</text>
	<text x="400" y="85" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="10.5">iOS · Android · user session</text>

	<!-- File / PDF Upload -->
	<rect x="638" y="46" width="148" height="52" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#4bffa5" stroke-opacity="0.28" stroke-width="1.2"/>
	<text x="712" y="67" text-anchor="middle" fill="#ffffff" fill-opacity="0.88" font-size="12" font-weight="600">File / PDF Upload</text>
	<text x="712" y="85" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="10.5">doc parsing · context inject</text>

	<!-- Arrows: Voice → Router, Client → Router, File → Router -->
	<path d="M 88 98 C 88 128 210 132 210 140" stroke="#4bffa5" stroke-opacity="0.45" stroke-width="1.4" fill="none" marker-end="url(#arr)"/>
	<line x1="400" y1="98" x2="400" y2="138" stroke="#4bffa5" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>
	<path d="M 712 98 C 712 128 590 132 590 140" stroke="#4bffa5" stroke-opacity="0.45" stroke-width="1.4" fill="none" marker-end="url(#arr)"/>

	<!-- ===== ROW 1: STREAMING ROUTER ===== -->
	<rect x="108" y="142" width="584" height="58" rx="9" fill="#4bffa5" fill-opacity="0.06" stroke="#4bffa5" stroke-opacity="0.55" stroke-width="1.5" filter="url(#glow)"/>
	<text x="400" y="166" text-anchor="middle" fill="#ffffff" fill-opacity="0.9" font-size="13" font-weight="700">Streaming Abstraction Layer</text>
	<text x="400" y="186" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="10.5">model router · context window manager · token stream handler</text>

	<!-- Fan-out arrows Router → 4 providers -->
	<line x1="178" y1="200" x2="140" y2="240" stroke="#4bffa5" stroke-opacity="0.45" stroke-width="1.4" marker-end="url(#arr)"/>
	<line x1="315" y1="200" x2="305" y2="240" stroke="#4bffa5" stroke-opacity="0.45" stroke-width="1.4" marker-end="url(#arr)"/>
	<line x1="485" y1="200" x2="495" y2="240" stroke="#4bffa5" stroke-opacity="0.45" stroke-width="1.4" marker-end="url(#arr)"/>
	<line x1="622" y1="200" x2="660" y2="240" stroke="#4bffa5" stroke-opacity="0.45" stroke-width="1.4" marker-end="url(#arr)"/>

	<!-- ===== ROW 2: AI PROVIDERS ===== -->

	<!-- OpenAI GPT-5 -->
	<rect x="55" y="244" width="165" height="58" rx="9" fill="#4bffa5" fill-opacity="0.07" stroke="#4bffa5" stroke-opacity="0.55" stroke-width="1.5" filter="url(#glowSm)"/>
	<text x="137" y="268" text-anchor="middle" fill="#4bffa5" font-size="12.5" font-weight="700">OpenAI GPT-5</text>
	<text x="137" y="288" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="10.5">reasoning · code · vision</text>

	<!-- Claude Opus 4 -->
	<rect x="233" y="244" width="165" height="58" rx="9" fill="#4bffa5" fill-opacity="0.07" stroke="#4bffa5" stroke-opacity="0.55" stroke-width="1.5" filter="url(#glowSm)"/>
	<text x="315" y="268" text-anchor="middle" fill="#4bffa5" font-size="12.5" font-weight="700">Claude Opus 4</text>
	<text x="315" y="288" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="10.5">writing · analysis · nuance</text>

	<!-- Gemini 2.5 Pro -->
	<rect x="411" y="244" width="165" height="58" rx="9" fill="#4bffa5" fill-opacity="0.07" stroke="#4bffa5" stroke-opacity="0.55" stroke-width="1.5" filter="url(#glowSm)"/>
	<text x="493" y="268" text-anchor="middle" fill="#4bffa5" font-size="12.5" font-weight="700">Gemini 2.5 Pro</text>
	<text x="493" y="288" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="10.5">data · multimodal · search</text>

	<!-- DeepSeek R1 -->
	<rect x="589" y="244" width="155" height="58" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#4bffa5" stroke-opacity="0.28" stroke-width="1.2"/>
	<text x="666" y="268" text-anchor="middle" fill="#ffffff" fill-opacity="0.88" font-size="12.5" font-weight="600">DeepSeek R1</text>
	<text x="666" y="288" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="10.5">open-weight · reasoning</text>

	<!-- Fan-in arrows providers → Stream Merger -->
	<path d="M 137 302 C 137 334 280 342 290 354" stroke="#4bffa5" stroke-opacity="0.45" stroke-width="1.4" fill="none" marker-end="url(#arr)"/>
	<path d="M 315 302 C 315 330 340 342 348 354" stroke="#4bffa5" stroke-opacity="0.45" stroke-width="1.4" fill="none" marker-end="url(#arr)"/>
	<path d="M 493 302 C 493 330 460 342 452 354" stroke="#4bffa5" stroke-opacity="0.45" stroke-width="1.4" fill="none" marker-end="url(#arr)"/>
	<path d="M 666 302 C 666 334 520 342 510 354" stroke="#4bffa5" stroke-opacity="0.45" stroke-width="1.4" fill="none" marker-end="url(#arr)"/>

	<!-- ===== ROW 3: STREAM MERGER ===== -->
	<rect x="228" y="358" width="344" height="56" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#4bffa5" stroke-opacity="0.32" stroke-width="1.2"/>
	<text x="400" y="381" text-anchor="middle" fill="#ffffff" fill-opacity="0.88" font-size="13" font-weight="600">Stream Merger</text>
	<text x="400" y="399" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="10.5">token stream · web search results · cited sources</text>

	<!-- Arrow ↓ -->
	<line x1="400" y1="414" x2="400" y2="448" stroke="#4bffa5" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>

	<!-- ===== ROW 4: SHARED CONTEXT STORE ===== -->
	<rect x="195" y="452" width="410" height="58" rx="9" fill="#4bffa5" fill-opacity="0.06" stroke="#4bffa5" stroke-opacity="0.48" stroke-width="1.5" filter="url(#glow)"/>
	<text x="400" y="477" text-anchor="middle" fill="#ffffff" fill-opacity="0.9" font-size="13" font-weight="700">Shared Context Store</text>
	<text x="400" y="496" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="10.5">conversation history · model-switch continuity · team collaboration</text>
</svg>
