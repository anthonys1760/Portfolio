<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 556" role="img" aria-label="NutriLogix AI system architecture diagram" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
	<defs>
		<marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
			<polygon points="0 0, 10 3.5, 0 7" fill="#4bffa5" opacity="0.75"/>
		</marker>
		<filter id="glow">
			<feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#4bffa5" flood-opacity="0.25"/>
		</filter>
		<filter id="glowSm">
			<feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#4bffa5" flood-opacity="0.18"/>
		</filter>
	</defs>

	<!-- Background -->
	<rect width="780" height="556" rx="16" fill="#0d0c14"/>

	<!-- Subtle grid -->
	<defs>
		<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
			<path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(75,255,165,0.04)" stroke-width="1"/>
		</pattern>
	</defs>
	<rect width="780" height="556" rx="16" fill="url(#grid)"/>

	<!-- Title -->
	<text x="390" y="30" text-anchor="middle" fill="#ffffff" fill-opacity="0.82" font-size="15" font-weight="600" letter-spacing="0.02em">NutriLogix AI — System Architecture</text>

	<!-- Track divider -->
	<line x1="390" y1="42" x2="390" y2="348" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" stroke-dasharray="4,8"/>

	<!-- Track labels -->
	<text x="195" y="52" text-anchor="middle" fill="#4bffa5" fill-opacity="0.5" font-size="9.5" font-weight="700" letter-spacing="0.12em">VISION PIPELINE</text>
	<text x="585" y="52" text-anchor="middle" fill="#4bffa5" fill-opacity="0.5" font-size="9.5" font-weight="700" letter-spacing="0.12em">BARCODE PIPELINE</text>

	<!-- ===== LEFT TRACK ===== -->

	<!-- Camera / Photo -->
	<rect x="90" y="58" width="210" height="54" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#4bffa5" stroke-opacity="0.28" stroke-width="1.2"/>
	<text x="195" y="80" text-anchor="middle" fill="#ffffff" fill-opacity="0.88" font-size="13" font-weight="600">Camera / Photo</text>
	<text x="195" y="99" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="11">RN Image Picker · Expo Camera</text>

	<!-- Arrow ↓ -->
	<line x1="195" y1="112" x2="195" y2="147" stroke="#4bffa5" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>

	<!-- OpenAI GPT-4o Vision (AI highlight) -->
	<rect x="90" y="152" width="210" height="58" rx="9" fill="#4bffa5" fill-opacity="0.07" stroke="#4bffa5" stroke-opacity="0.6" stroke-width="1.5" filter="url(#glowSm)"/>
	<text x="195" y="176" text-anchor="middle" fill="#4bffa5" font-size="13" font-weight="700">OpenAI GPT-4o Vision</text>
	<text x="195" y="196" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="11">food ID · portion estimate</text>

	<!-- Arrow ↓ -->
	<line x1="195" y1="210" x2="195" y2="246" stroke="#4bffa5" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>

	<!-- Macro Parser -->
	<rect x="90" y="250" width="210" height="54" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#4bffa5" stroke-opacity="0.28" stroke-width="1.2"/>
	<text x="195" y="272" text-anchor="middle" fill="#ffffff" fill-opacity="0.88" font-size="13" font-weight="600">Macro Parser</text>
	<text x="195" y="291" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="11">calories · protein · carbs · fat</text>

	<!-- Arrow ↘ curved to Supabase -->
	<path d="M 195 304 C 195 342 288 344 300 374" stroke="#4bffa5" stroke-opacity="0.5" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

	<!-- ===== RIGHT TRACK ===== -->

	<!-- Barcode Scanner -->
	<rect x="480" y="58" width="210" height="54" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#4bffa5" stroke-opacity="0.28" stroke-width="1.2"/>
	<text x="585" y="80" text-anchor="middle" fill="#ffffff" fill-opacity="0.88" font-size="13" font-weight="600">Barcode Scanner</text>
	<text x="585" y="99" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="11">Expo BarCodeScanner</text>

	<!-- Arrow ↓ -->
	<line x1="585" y1="112" x2="585" y2="147" stroke="#4bffa5" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>

	<!-- Product Database -->
	<rect x="480" y="152" width="210" height="54" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#4bffa5" stroke-opacity="0.28" stroke-width="1.2"/>
	<text x="585" y="174" text-anchor="middle" fill="#ffffff" fill-opacity="0.88" font-size="13" font-weight="600">Product Database</text>
	<text x="585" y="193" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="11">UPC · Open Food Facts API</text>

	<!-- Arrow ↓ -->
	<line x1="585" y1="206" x2="585" y2="245" stroke="#4bffa5" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>

	<!-- Health Score Engine -->
	<rect x="480" y="250" width="210" height="54" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#4bffa5" stroke-opacity="0.28" stroke-width="1.2"/>
	<text x="585" y="272" text-anchor="middle" fill="#ffffff" fill-opacity="0.88" font-size="13" font-weight="600">Health Score Engine</text>
	<text x="585" y="291" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="11">localized nutrient scoring</text>

	<!-- Arrow ↙ curved to Supabase -->
	<path d="M 585 304 C 585 342 492 344 480 374" stroke="#4bffa5" stroke-opacity="0.5" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

	<!-- ===== MERGE LAYER ===== -->

	<!-- Supabase (center, wider) -->
	<rect x="240" y="378" width="300" height="68" rx="9" fill="#4bffa5" fill-opacity="0.06" stroke="#4bffa5" stroke-opacity="0.5" stroke-width="1.5" filter="url(#glow)"/>
	<text x="390" y="404" text-anchor="middle" fill="#ffffff" fill-opacity="0.9" font-size="13" font-weight="700">Supabase</text>
	<text x="390" y="424" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="11">Postgres · Row-Level Security · Auth (JWT) · Storage Buckets</text>

	<!-- Arrow ↓ -->
	<line x1="390" y1="446" x2="390" y2="476" stroke="#4bffa5" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>

	<!-- Apple Health / HealthKit -->
	<rect x="268" y="480" width="244" height="54" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#4bffa5" stroke-opacity="0.28" stroke-width="1.2"/>
	<text x="390" y="502" text-anchor="middle" fill="#ffffff" fill-opacity="0.88" font-size="13" font-weight="600">Apple Health / HealthKit</text>
	<text x="390" y="521" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="11">activity · calorie burn · steps sync</text>
</svg>
