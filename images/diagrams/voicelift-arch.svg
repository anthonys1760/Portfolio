<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" role="img" aria-label="VoiceLift system architecture diagram" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
	<defs>
		<marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
			<polygon points="0 0, 10 3.5, 0 7" fill="#4bffa5" opacity="0.75"/>
		</marker>
		<filter id="glow">
			<feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#4bffa5" flood-opacity="0.25"/>
		</filter>
		<filter id="glowSm">
			<feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#4bffa5" flood-opacity="0.18"/>
		</filter>
		<pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
			<path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(75,255,165,0.04)" stroke-width="1"/>
		</pattern>
	</defs>

	<!-- Background -->
	<rect width="760" height="560" rx="16" fill="#0d0c14"/>
	<rect width="760" height="560" rx="16" fill="url(#grid)"/>

	<!-- Title -->
	<text x="380" y="30" text-anchor="middle" fill="#ffffff" fill-opacity="0.82" font-size="15" font-weight="600" letter-spacing="0.02em">VoiceLift — System Architecture</text>

	<!-- ===== ROW 0: React Native Client ===== -->
	<rect x="220" y="46" width="300" height="54" rx="9" fill="#4bffa5" fill-opacity="0.07" stroke="#4bffa5" stroke-opacity="0.6" stroke-width="1.5" filter="url(#glowSm)"/>
	<text x="370" y="68" text-anchor="middle" fill="#4bffa5" font-size="13" font-weight="700">React Native Client</text>
	<text x="370" y="87" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="10.5">Expo SDK · voice button · ripple animation</text>

	<!-- Arrow ↓ -->
	<line x1="370" y1="100" x2="370" y2="130" stroke="#4bffa5" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>

	<!-- ===== ROW 1: OpenAI Whisper ===== -->
	<rect x="220" y="134" width="300" height="54" rx="9" fill="#4bffa5" fill-opacity="0.07" stroke="#4bffa5" stroke-opacity="0.55" stroke-width="1.5" filter="url(#glowSm)"/>
	<text x="370" y="156" text-anchor="middle" fill="#4bffa5" font-size="13" font-weight="700">OpenAI Whisper</text>
	<text x="370" y="175" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="10.5">speech-to-text · streaming transcription</text>

	<!-- Arrow ↓ -->
	<line x1="370" y1="188" x2="370" y2="220" stroke="#4bffa5" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>

	<!-- ===== ROW 2: GPT-4o Structured Outputs ===== -->
	<rect x="220" y="224" width="300" height="54" rx="9" fill="#4bffa5" fill-opacity="0.07" stroke="#4bffa5" stroke-opacity="0.55" stroke-width="1.5" filter="url(#glowSm)"/>
	<text x="370" y="246" text-anchor="middle" fill="#4bffa5" font-size="13" font-weight="700">GPT-4o Structured Outputs</text>
	<text x="370" y="265" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="10.5">gym-slang parser · supersets · compound sets</text>

	<!-- Arrow ↓ -->
	<line x1="370" y1="278" x2="370" y2="308" stroke="#4bffa5" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>

	<!-- ===== ROW 3: Set / Superset State Machine ===== -->
	<rect x="220" y="312" width="300" height="54" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#4bffa5" stroke-opacity="0.28" stroke-width="1.2"/>
	<text x="370" y="334" text-anchor="middle" fill="#ffffff" fill-opacity="0.88" font-size="13" font-weight="600">Set / Superset State Machine</text>
	<text x="370" y="353" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="10.5">exercise · weight · reps · set type</text>

	<!-- Arrow ↓ -->
	<line x1="370" y1="366" x2="370" y2="396" stroke="#4bffa5" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>

	<!-- ===== ROW 4: Confirmation Sheet ===== -->
	<rect x="220" y="400" width="300" height="54" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#4bffa5" stroke-opacity="0.28" stroke-width="1.2"/>
	<text x="370" y="422" text-anchor="middle" fill="#ffffff" fill-opacity="0.88" font-size="13" font-weight="600">Confirmation Sheet</text>
	<text x="370" y="441" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="10.5">user verifies · edit or re-record before save</text>

	<!-- Re-record feedback loop (dashed, left side) -->
	<path d="M 220 427 C 88 427 88 73 220 73" stroke="#4bffa5" stroke-opacity="0.3" stroke-width="1.2" fill="none" stroke-dasharray="5,4" marker-end="url(#arr)"/>
	<text x="55" y="260" text-anchor="middle" fill="#4bffa5" fill-opacity="0.45" font-size="9.5" font-weight="600" letter-spacing="0.08em" transform="rotate(-90 55 260)">re-record</text>

	<!-- Arrow ↓ from Confirmation to Supabase -->
	<line x1="370" y1="454" x2="370" y2="482" stroke="#4bffa5" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#arr)"/>

	<!-- ===== ROW 5: Supabase ===== -->
	<rect x="220" y="486" width="300" height="58" rx="9" fill="#4bffa5" fill-opacity="0.06" stroke="#4bffa5" stroke-opacity="0.48" stroke-width="1.5" filter="url(#glow)"/>
	<text x="370" y="511" text-anchor="middle" fill="#ffffff" fill-opacity="0.9" font-size="13" font-weight="700">Supabase</text>
	<text x="370" y="530" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="10.5">Postgres · Row-Level Security · Auth (JWT)</text>

	<!-- RevenueCat side node -->
	<line x1="520" y1="515" x2="572" y2="515" stroke="#4bffa5" stroke-opacity="0.4" stroke-width="1.3" marker-end="url(#arr)"/>
	<rect x="576" y="492" width="148" height="46" rx="9" fill="#ffffff" fill-opacity="0.04" stroke="#4bffa5" stroke-opacity="0.28" stroke-width="1.2"/>
	<text x="650" y="511" text-anchor="middle" fill="#ffffff" fill-opacity="0.88" font-size="12" font-weight="600">RevenueCat</text>
	<text x="650" y="528" text-anchor="middle" fill="#ffffff" fill-opacity="0.42" font-size="10.5">subscription · entitlement</text>
</svg>
