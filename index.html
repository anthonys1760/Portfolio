	<!-- Hero chat streamer: natural LLM-style token streaming -->
	<script>
	(function () {
		var REPLY = "Anthony is a Full-Stack Web Developer based in Grand Rapids, Michigan.\n\nHe builds production websites, web apps, and AI-powered chatbots — turning ideas into shipped, revenue-generating products.\n\nHe's also a code mentor who spends every day deep in <span class=\"accent\">JavaScript</span>, <span class=\"accent\">TypeScript</span>, and the modern web platform.";

		var dots = document.getElementById('typing-dots');
		var textEl = document.getElementById('chat-text');
		var cta = document.getElementById('hero-cta-wrap');
		if (!dots || !textEl || !cta) return;

		// Tokenize the reply so we can stream raw text while preserving HTML spans.
		// Strategy: split the string into tokens that are either a full HTML tag or a single visible char.
		function tokenize(str) {
			var tokens = [];
			var i = 0;
			while (i < str.length) {
				if (str[i] === '<') {
					var end = str.indexOf('>', i);
					if (end === -1) { tokens.push(str[i]); i++; continue; }
					tokens.push(str.slice(i, end + 1));
					i = end + 1;
				} else {
					tokens.push(str[i]);
					i++;
				}
			}
			return tokens;
		}

		var tokens = tokenize(REPLY);
		var cursor = 0;
		var buffer = '';
		var caretEl;

		function rand(min, max) { return min + Math.random() * (max - min); }

		function render() {
			// Convert \n\n to paragraph breaks and \n to <br/>
			var html = buffer.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br/>');
			textEl.innerHTML = '<p>' + html + '</p>';
			// Append caret to the last paragraph
			var lastP = textEl.querySelector('p:last-child');
			if (lastP) {
				if (!caretEl) caretEl = document.createElement('span');
				caretEl.className = 'chat-caret';
				lastP.appendChild(caretEl);
			}
		}

		function revealCTA() {
			if (caretEl) caretEl.classList.add('blink');
			cta.classList.add('revealed');
		}

		function streamNext() {
			if (cursor >= tokens.length) {
				revealCTA();
				return;
			}

			// Take a random chunk of 2-5 visible chars (but consume full HTML tags atomically).
			var chunkTarget = Math.floor(rand(2, 6));
			var consumedVisible = 0;
			var paragraphBreak = false;
			while (cursor < tokens.length && consumedVisible < chunkTarget) {
				var tok = tokens[cursor++];
				buffer += tok;
				if (tok.length > 1 && tok[0] === '<') {
					// HTML tag — doesn't count toward visible chunk size
					continue;
				}
				consumedVisible++;
				// Stop early on paragraph break so we can pause longer
				if (tok === '\n' && cursor < tokens.length && tokens[cursor] === '\n') {
					buffer += tokens[cursor++];
					paragraphBreak = true;
					break;
				}
			}

			render();

			// Decide next delay
			var last = buffer.slice(-1);
			var delay = rand(28, 95);
			if (/[.!?]/.test(last)) delay += rand(220, 380);
			else if (/[,:;]/.test(last)) delay += rand(120, 220);
			if (paragraphBreak) delay += rand(420, 600);
			// Occasional "thinking" pause
			if (Math.random() < 0.04) delay += rand(400, 800);

			setTimeout(streamNext, delay);
		}

		// Show typing dots first, then begin streaming
		setTimeout(function () {
			dots.style.display = 'none';
			textEl.style.display = '';
			streamNext();
		}, 750);
	})();
	</script>
