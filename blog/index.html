		.blog-hero {
			padding: 150px 0 60px;
			text-align: center;

		.blog-hero h1 {
			font-size: 2.8rem;

		.blog-grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
			gap: 28px;
			max-width: 1100px;
			margin: 0 auto;
			padding: 0 24px;
		}

		.blog-card {
			background: rgba(255,255,255,0.04);
			border: 1px solid rgba(255,255,255,0.08);
			border-radius: 16px;
			overflow: hidden;
			transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
			text-decoration: none;
			display: flex;
			flex-direction: column;
			cursor: pointer;
		}
		.blog-card:hover {
			transform: translateY(-5px);
			border-color: rgba(75,255,165,0.35);
			box-shadow: 0 16px 40px rgba(0,0,0,0.4);
		}
		.blog-card-img {
			width: 100%;
			height: 200px;
			object-fit: cover;
			display: block;
			background: #111;
		}
		.blog-card-body {
			padding: 22px 24px 26px;
			display: flex;
			flex-direction: column;
			flex: 1;
		}
		.blog-card-meta {
			display: flex;
			align-items: center;
			gap: 10px;
			margin-bottom: 12px;
		}
		.blog-card-category {
			font-size: 0.72rem;
			font-weight: 600;
			text-transform: uppercase;
			letter-spacing: 0.08em;
			color: #4bffa5;
			background: rgba(75,255,165,0.1);
			border: 1px solid rgba(75,255,165,0.25);
			border-radius: 20px;
			padding: 3px 10px;
		}
		.blog-card-read {
			font-size: 0.78rem;
			color: rgba(255,255,255,0.35);
		}
		.blog-card-title {
			font-size: 1.1rem;
			font-weight: 600;
			color: #fff;
			margin: 0 0 10px;
			line-height: 1.45;
		}
		.blog-card-excerpt {
			font-size: 0.88rem;
			color: rgba(255,255,255,0.5);
			line-height: 1.65;
			flex: 1;
			margin-bottom: 18px;
		}
		.blog-card-footer {
			display: flex;
			align-items: center;
			justify-content: space-between;
		}
		.blog-card-date {

			color: rgba(255,255,255,0.3);
		}
		.blog-card-arrow {

			font-weight: 600;

		.blog-empty {

			font-size: 1rem;

	<script>
		(async function () {
			const grid = document.getElementById('blog-grid');

			let posts = [];
			try {
				const res = await fetch('/blog/data/posts.json?v=' + Date.now());
				posts = await res.json();
			} catch (e) {
				grid.innerHTML = '<div class="blog-empty"><strong>Coming soon</strong>New posts drop every week. Check back soon.</div>';
				return;
			}

			if (!posts.length) {
				grid.innerHTML = '<div class="blog-empty"><strong>Coming soon</strong>New posts drop every week. Check back soon.</div>';
				return;
			}

			grid.innerHTML = posts.map(post => `
				<a class="blog-card" href="/blog/posts/${post.slug}.html">
					<img class="blog-card-img" src="${post.image}" alt="${post.title}" loading="lazy" onerror="this.style.display='none'">
					<div class="blog-card-body">
						<div class="blog-card-meta">
							<span class="blog-card-category">${post.category}</span>
							<span class="blog-card-read">${post.readTime} read</span>
						</div>
						<h2 class="blog-card-title">${post.title}</h2>
						<p class="blog-card-excerpt">${post.excerpt}</p>
						<div class="blog-card-footer">
							<span class="blog-card-date">${post.date}</span>
							<span class="blog-card-arrow">Read more &rarr;</span>
						</div>
					</div>
				</a>
			`).join('');
		})();
	</script>
